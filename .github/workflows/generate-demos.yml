name: Generate Demos

on:
  push:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: generate-gif
  cancel-in-progress: true

jobs:
  generate-gif:
    name: Generate demo GIF
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout master branch
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build demo GIFs
        uses: docker/bake-action@v7
        with:
          files: docker-bake.hcl
          source: .
          targets: demos
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      - name: Upload GIFs to assets release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create assets --title "assets" --notes "Demo GIF storage" 2>/dev/null || true
          gh release upload assets *.gif --clobber
